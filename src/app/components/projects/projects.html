<section class="py-5">
    <div class="container">
        <div class="row mb-5 align-items-center flex-column">

            @for (proyecto of misProyectos; track proyecto.nombre) {
            <div class="card mb-3 p-4 col-10 col-md-11 proyectos">
                <div class="row g-0">
                    <div class="col-lg-4 col-md-5 d-flex align-items-center justify-content-center">
                        <img [src]="proyecto.imagen" class="img-fluid rounded" style="max-height: 290px;" alt="...">
                    </div>
                    <div class="col-lg-8 col-md-7 d-flex flex-column card-body">
                        <div class="mb-3">
                            <h3 class="card-title fw-bold">{{ proyecto.nombre }}</h3>
                            <p class="card-text">{{ proyecto.descripcion }}</p>
                        </div>

                        <div>
                            @for(tec of proyecto.tecnologias; track tec){
                            <span class="badge about-badge mb-3 me-2">{{ tec | uppercase}}</span>
                            }
                        </div>

                        @if (proyecto.github != ""){
                            <div class="col-12 col-lg-4">
                                <a [href]="proyecto.github" target="_blank" rel="noopener"
                                    class="github-link d-flex align-items-center gap-3 p-3 rounded-3">
                                    <div class="github-icon">
                                        <i class="bi bi-github"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold">GitHub</div>
                                        <small class="text-muted">{{ proyecto.nombre }}</small>
                                    </div>
                                </a>
                            </div>
                        }

                    </div>
                </div>
            </div>
            }
        </div>
    </div>

</section>
